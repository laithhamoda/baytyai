name: Deploy Angular

on:
  push:
    branches: [main]
    paths:
      - 'baytyai-angular/**'
      - '.github/workflows/deploy-angular.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: baytyai-angular/package-lock.json

      - name: Install dependencies
        working-directory: baytyai-angular
        run: npm ci

      - name: Build
        working-directory: baytyai-angular
        run: npm run build -- --configuration production

      # Vercel auto-deploys when connected to this repo.
      # The dist/baytyai-angular/browser folder is the output to serve.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: baytyai-angular/dist/
